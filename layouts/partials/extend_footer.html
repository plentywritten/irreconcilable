<style>
  .post-content p {
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .post-content p.visible {
    opacity: 1;
    transform: translateY(0);
  }
</style>

<script>
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
      }
    });
  }, { threshold: 0.1 });

  document.querySelectorAll('.post-content p').forEach(p => {
    observer.observe(p);
  });
</script>

<style>
  .cover-title-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-family: 'Lora', serif;
    font-size: clamp(4rem, 7em, 7em); /* min, preferred, max */
    font-weight: 700;
    text-align: center;
    /*text-shadow: 2px 2px 8px rgba(0,0,0,0.6);*/
    pointer-events: none;
    z-index: 10;
    width: 90%;
  }
</style>

<script>
  const cover = document.querySelector('.post-single .entry-cover');
  const title = document.querySelector('.post-single .post-title');
  if (cover && title) {
    cover.style.position = 'relative';
    const overlay = document.createElement('div');
    overlay.classList.add('cover-title-overlay');
    overlay.textContent = title.textContent.trim();
    cover.appendChild(overlay);
  }
</script>

<style>
  #reading-progress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 2px;
    background-color: #2c3e50;
    z-index: 9999;
    transition: width 0.1s ease;
  }

  [data-theme="dark"] #reading-progress {
    background-color: #f5f5dc;
  }
</style>

<script>
  const bar = document.createElement('div');
  bar.id = 'reading-progress';
  document.body.prepend(bar);

  const content = document.querySelector('.post-content');
  if (content) {
    window.addEventListener('scroll', () => {
      const contentTop = content.offsetTop;
      const contentHeight = content.offsetHeight;
      const scrolled = window.scrollY - contentTop;
      const percent = Math.min(100, Math.max(0, (scrolled / contentHeight) * 100));
      bar.style.width = percent + '%';
    });
  }
</script>
